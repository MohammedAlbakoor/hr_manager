<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="hr_manager">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>hr_manager</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    if (window.location.pathname === '/app') {
      window.location.replace('/app/' + window.location.search + window.location.hash);
    }

    function loadFlutterApp() {
      var script = document.createElement('script');
      script.src = 'flutter_bootstrap.js';
      script.async = true;
      document.body.appendChild(script);
    }

    async function resetOldFlutterCacheOnce() {
      if (!('serviceWorker' in navigator) || !navigator.serviceWorker.controller) {
        loadFlutterApp();
        return;
      }

      if (sessionStorage.getItem('hr_manager_flutter_cache_reset_v1') === 'done') {
        loadFlutterApp();
        return;
      }

      sessionStorage.setItem('hr_manager_flutter_cache_reset_v1', 'done');
      try {
        var registrations = await navigator.serviceWorker.getRegistrations();
        await Promise.all(registrations.map(function (registration) {
          return registration.unregister();
        }));

        if ('caches' in window) {
          var cacheNames = await caches.keys();
          await Promise.all(cacheNames.map(function (cacheName) {
            return caches.delete(cacheName);
          }));
        }
      } finally {
        window.location.reload();
      }
    }

    resetOldFlutterCacheOnce();
  </script>
</body>
</html>
